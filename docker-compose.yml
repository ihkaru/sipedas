# SIKENDIS Production Stack (April 2026)
# Optimized for Coolify & FrankenPHP Worker Mode
services:
    app:
        build:
            context: .
            target: prod
        image: sikendis-app:latest
        restart: unless-stopped
        # Production Traefik & SSL Labels (Exact match from server recommendation)
        labels:
            - "traefik.enable=true"
            - "traefik.docker.network=coolify"
            - "traefik.http.routers.dokterv-router.rule=Host(`admin.dvlpid.my.id`)"
            - "traefik.http.routers.dokterv-router.entrypoints=http,https"
            - "traefik.http.routers.dokterv-router.tls=true"
            - "traefik.http.routers.dokterv-router.tls.certresolver=letsencrypt"
            - "traefik.http.services.dokterv-service.loadbalancer.server.port=80"
            - "coolify.managed=true"
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost/up"]
            interval: 30s
            timeout: 10s
            retries: 3
        networks:
            - coolify

networks:
    # Use the shared coolify network to connect to standalone databases and Traefik
    coolify:
        external: true
