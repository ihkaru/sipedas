services:
    # Laravel App with FrankenPHP
    app:
        build:
            context: .
            target: dev
        container_name: sikendis-app
        restart: unless-stopped
        ports:
            - "127.0.0.1:8200:80"
        volumes:
            - ./:/app:cached
            - /app/vendor
            - /app/node_modules
            - /app/storage
        # Command uses watch mode in dev. In prod, target prod will use the Dockerfile CMD.
        # We rely on the Dockerfile's CMD to handle startup (including admin-port fix)
        depends_on:
            db:
                condition: service_healthy
            redis:
                condition: service_healthy
        env_file:
            - .env.docker
        environment:
            # Override for dev context
            XDG_CONFIG_HOME: /app/.config
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost/up"]
            interval: 30s
            timeout: 10s
            retries: 3
        networks:
            - sikendis_network

    # MySQL Database
    db:
        image: mysql:8.0
        container_name: sikendis-db
        restart: unless-stopped
        ports:
            - "127.0.0.1:3309:3306"
        volumes:
            - mysql_data:/var/lib/mysql
        # This healthcheck is what the app container waits for
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root"]
            interval: 10s
            timeout: 5s
            retries: 5
        env_file:
            - .env.docker
        networks:
            - sikendis_network

    # Redis Cache
    redis:
        image: redis:alpine
        container_name: sikendis-redis
        restart: unless-stopped
        volumes:
            - redis_data:/data
        # We add a healthcheck to redis as well for good measure
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5
        env_file:
            - .env.docker
        networks:
            - sikendis_network

    # phpMyAdmin
    phpmyadmin:
        image: phpmyadmin
        container_name: sikendis-pma
        restart: unless-stopped
        ports:
            - "127.0.0.1:8281:80"
        environment:
            PMA_HOST: db
            PMA_PORT: 3306
            UPLOAD_LIMIT: 200M
        depends_on:
            - db
        networks:
            - sikendis_network
        # phpMyAdmin doesn't need all the app variables, so we can remove this
        # env_file:
        #    - .env.docker

volumes:
    mysql_data:
    redis_data:

networks:
    sikendis_network:
        driver: bridge
