# SIKENDIS Production Stack (April 2026)
# Optimized for Coolify & FrankenPHP Worker Mode
services:
    app:
        build:
            context: .
            target: prod
        image: sikendis-app:latest
        restart: unless-stopped
        # Coolify handles domain mapping and SSL via Traefik. 
        # We only expose port 80 internally within the docker network.
        expose:
            - 80
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost/up"]
            interval: 30s
            timeout: 10s
            retries: 3
        # In production, we don't need volumes for code, but we might need for persistent storage
        # volumes:
        #    - sikendis_storage:/app/storage
        networks:
            - coolify

networks:
    # Use the shared coolify network to connect to standalone databases
    coolify:
        external: true
